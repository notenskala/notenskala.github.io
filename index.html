<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notenskala Berechnung - Gymnasiale Oberstufe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Notenskala Berechnung - Gymnasiale Oberstufe</h1>
  <div class="input-area">
    <label for="maxPunkte">Maximal erreichbare Punktzahl:</label>
    <input type="number" id="maxPunkte" min="1" step="1" value="100" placeholder="z.B. 100">
    
    <div class="modi-container">
      <div class="modi-row">
        <label class="checkbox-label">
          <input type="checkbox" id="anpassenBestehenCheckbox"> Bestehensgrenze anpassen
        </label>
      </div>
      <div class="modi-row toggle-row hidden" id="bestehenRow">
        <label for="bestehenProzent" class="toggle-label">Note 4 Grenze (%):</label>
        <input type="number" id="bestehenProzent" min="1" max="94" step="1" value="45" style="width: 80px; margin-left: 8px; padding: 0.3rem 0.5rem; font-size: 0.9rem;">
      </div>

      <div class="modi-row">
        <label class="checkbox-label">
          <input type="checkbox" id="ungerundetCheckbox" checked> ungerundet
        </label>
      </div>

      <div class="modi-row" id="halbRundenRow">
        <label class="checkbox-label half-round-label disabled">
          <input type="checkbox" id="halbRundenCheckbox" disabled> auf 0,5 runden
        </label>
      </div>
      
      <div class="modi-row toggle-row hidden" id="toggleRow">
        <span class="toggle-label">abrunden</span>
        <label class="switch">
          <input type="checkbox" id="rundungToggle">
          <span class="slider round"></span>
        </label>
        <span class="toggle-label">aufrunden</span>
      </div>
    </div>

    <div class="dropdown-container">
      <button id="downloadBtn" class="download-btn">als Bild herunterladen ▼</button>
      <div class="dropdown-menu" id="dropdownMenu">
        <button id="downloadTableBtn">Tabelle als Bild</button>
        <button id="downloadSpiegelBtn">Klausurspiegel</button>
      </div>
    </div>
  </div>
  
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Note</th>
          <th>Punktzahl</th>
          <th>Erreichte Punktzahl</th>
        </tr>
      </thead>
      <tbody id="tabellenKoerper"></tbody>
    </table>
  </div>
  
  <div class="footer">
  <span>
    proudly developed with love by Niklas Karoli
    <svg class="pride-heart" viewBox="0 0 32 32" fill="none" xmlns="http://w3.org">
      <defs>
        <linearGradient id="prideGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#E40303" />
          <stop offset="16.6%" stop-color="#E40303" />
          <stop offset="16.6%" stop-color="#FF8C00" />
          <stop offset="33.3%" stop-color="#FF8C00" />
          <stop offset="33.3%" stop-color="#FFED00" />
          <stop offset="50%" stop-color="#FFED00" />
          <stop offset="50%" stop-color="#008026" />
          <stop offset="66.6%" stop-color="#008026" />
          <stop offset="66.6%" stop-color="#004DFF" />
          <stop offset="83.3%" stop-color="#004DFF" />
          <stop offset="83.3%" stop-color="#732982" />
          <stop offset="100%" stop-color="#732982" />
        </linearGradient>
      </defs>
      <path
        d="M16 28.5L14.5 27.1C9.2 22.3 5.7 19.1 5.7 15.2C5.7 12 8.2 9.5 11.4 9.5C13.2 9.5 14.9 10.3 16 11.7C17.1 10.3 18.8 9.5 20.6 9.5C23.8 9.5 26.3 12 26.3 15.2C26.3 19.1 22.8 22.3 17.5 27.2L16 28.5Z"
        fill="url(#prideGradient)"
      />
    </svg>
  </span>
</div>
</div>
<script src="html2canvas.min.js"></script>
<script src="script.js"></script>
</body>
</html>
