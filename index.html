<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, inital-scale=1.0">
  <title>Notenskala Berechnung - Gymnasiale Oberstufe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Notenskala Berechnung - Gymnasiale Oberstufe</h1>
    <div class="input-area">
      <label for="maxPunkte">Maximal erreichbare Punktzahl:</label>
      <input type="number" id="maxPunkte" min="1" step="1" value="100" placeholder="punktzahl">
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Note</th>
            <th>Punktzahl</th>
            <th>Erreichte Punktzahl</th>
          </tr>
        </thead>
        <tbody id="tabellenKoerper"></tbody>
      </table>
    </div>
    <div class="footer">proudly developed by Niklas K.</div>
  </div>
  <script src="script.js"></script>
</body>
</html>
